name: CI

on:
  push:
    branches: [main, master, humble]
  pull_request:
    branches: [main, master, humble]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/ROS2-Nexus-Embodied-Assistant

      - name: Setup ROS environment
        run: |
          apt-get update && apt-get install -y \
            ros-humble-ros2control \
            ros-humble-ros2-controllers \
            python3-colcon-common-extensions \
            python3-pip
          . /opt/ros/humble/setup.sh

      - name: Install Python deps
        run: pip3 install --break-system-packages openai pyyaml requests

      - name: Build
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --symlink-install --packages-up-to nexus_orchestrator

      - name: Test
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          colcon test --packages-select nexus_brain nexus_perception nexus_orchestrator
          colcon test-result --verbose
