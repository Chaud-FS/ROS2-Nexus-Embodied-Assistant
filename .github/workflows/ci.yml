name: CI

on:
  push:
    branches: [main, master, humble]
  pull_request:
    branches: [main, master, humble]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/ROS2-Nexus-Embodied-Assistant

      - name: Setup ROS environment
        run: |
          # Ensure universe repository is enabled for ROS packages
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y universe
          apt-get update

          # Core build tools
          apt-get install -y \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-pip \
            python3-vcstool \
            build-essential

          # ros2_control stack (note the correct package names)
          apt-get install -y \
            ros-humble-ros2-control \
            ros-humble-ros2-controllers \
            ros-humble-gazebo-ros2-control \
            ros-humble-gazebo-ros-pkgs

          # MoveIt2 and robot description tooling
          apt-get install -y \
            ros-humble-moveit \
            ros-humble-moveit-ros-planning-interface \
            ros-humble-xacro \
            ros-humble-robot-state-publisher \
            ros-humble-joint-state-publisher-gui

          # Vision / sensor bridges
          apt-get install -y \
            ros-humble-image-transport \
            ros-humble-cv-bridge

          # Initialize rosdep if not already done
          if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            rosdep init || true
          fi
          rosdep update

          . /opt/ros/humble/setup.sh

      - name: Install package dependencies with rosdep
        run: |
          . /opt/ros/humble/setup.sh
          cd src
          rosdep install --from-paths . --ignore-src -r -y

      - name: Install Python deps
        run: |
          pip3 install --break-system-packages openai pyyaml requests || \
          pip3 install openai pyyaml requests

      - name: Build
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --symlink-install --packages-up-to nexus_orchestrator

      - name: Test
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          colcon test --packages-select nexus_brain nexus_perception nexus_orchestrator
          colcon test-result --verbose
