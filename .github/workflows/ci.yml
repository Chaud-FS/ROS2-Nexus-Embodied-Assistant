name: CI

on:
  push:
    branches: [main, master, humble]
  pull_request:
    branches: [main, master, humble]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/ROS2-Nexus-Embodied-Assistant

      - name: Install base tools
        run: |
          # Enable the universe repository (some dependencies live there).
          # Using sed instead of add-apt-repository avoids a chicken-and-egg
          # failure when software-properties-common is not yet installed.
          sed -i 's/^#\s*\(deb.*universe\)$/\1/' /etc/apt/sources.list
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-pip
          . /opt/ros/humble/setup.sh

      - name: Install Python deps
        run: |
          pip3 install --break-system-packages --no-cache-dir openai pyyaml requests pillow || \
          pip3 install --no-cache-dir openai pyyaml requests pillow

      - name: Install ROS dependencies via rosdep
        run: |
          . /opt/ros/humble/setup.sh
          rosdep update
          cd src
          rosdep install --from-paths . --ignore-src -y -r

      - name: Build
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --symlink-install --packages-up-to nexus_orchestrator

      - name: Test
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          # Run pytest directly instead of `colcon test`: ament_python's
          # package.sh-based test entry is unreliable (not generated for every
          # python package), and `colcon test` spawns a subprocess that picks
          # up the system pytest (6.x) which lacks `_pytest.scope` and crashes
          # the anyio plugin pulled in by openai.
          #
          # Belt-and-suspenders:
          #  - pytest>=7.4 provides the `_pytest.scope` module anyio needs
          #  - anyio<4 does not touch `_pytest.scope` at all, so even if the
          #    system pytest is somehow used the run no longer crashes.
          # pytest must stay on 7.x: ROS's launch_testing plugin registers the
          # old `pytest_pycollect_makemodule(path, parent)` hook, which was
          # renamed to `file_path` in pytest 8+, so pytest>=8 crashes with a
          # PluginValidationError. 7.x also provides the `_pytest.scope` module
          # that anyio needs. anyio<4 is belt-and-suspenders (its plugin does
          # not touch `_pytest.scope` at all).
          pip3 install -U 'pytest>=7.4,<8' 'anyio<4' || \
          pip3 install -U --user 'pytest>=7.4,<8' 'anyio<4'
          python3 -m pytest --version
          # Make the three ament_python packages importable from source. With
          # --symlink-install colcon symlinks them into install/, but the
          # generated site-packages entry is not reliably picked up here, so we
          # add the source package roots explicitly. (install/setup.sh still
          # provides nexus_interfaces, ROS msgs, etc.)
          export PYTHONPATH="$PWD/src/ROS2-Nexus-Embodied-Assistant/src/nexus_brain:$PWD/src/ROS2-Nexus-Embodied-Assistant/src/nexus_perception:$PWD/src/ROS2-Nexus-Embodied-Assistant/src/nexus_orchestrator:$PYTHONPATH"
          # The repo is checked out to src/ROS2-Nexus-Embodied-Assistant
          # (see the checkout `path:`), so the ROS packages are nested one
          # level deeper than the workspace root.
          python3 -m pytest \
            src/ROS2-Nexus-Embodied-Assistant/src/nexus_brain/tests \
            src/ROS2-Nexus-Embodied-Assistant/src/nexus_perception/tests \
            src/ROS2-Nexus-Embodied-Assistant/src/nexus_orchestrator/tests \
            -v
