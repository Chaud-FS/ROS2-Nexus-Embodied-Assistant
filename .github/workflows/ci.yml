name: CI

on:
  push:
    branches: [main, master, humble]
  pull_request:
    branches: [main, master, humble]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/ROS2-Nexus-Embodied-Assistant

      - name: Install base tools
        run: |
          # Enable the universe repository (some dependencies live there).
          # Using sed instead of add-apt-repository avoids a chicken-and-egg
          # failure when software-properties-common is not yet installed.
          sed -i 's/^#\s*\(deb.*universe\)$/\1/' /etc/apt/sources.list
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-pip
          . /opt/ros/humble/setup.sh

      - name: Install Python deps
        run: |
          pip3 install --break-system-packages --no-cache-dir openai pyyaml requests || \
          pip3 install --no-cache-dir openai pyyaml requests

      - name: Install ROS dependencies via rosdep
        run: |
          . /opt/ros/humble/setup.sh
          rosdep update
          cd src
          rosdep install --from-paths . --ignore-src -y -r

      - name: Build
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --symlink-install --packages-up-to nexus_orchestrator

      - name: Test
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          colcon test --packages-select nexus_brain nexus_perception nexus_orchestrator
          colcon test-result --verbose
