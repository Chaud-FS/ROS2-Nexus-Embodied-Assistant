# Controller configuration for the Nexus arm inside Gazebo.
# Loaded by the gazebo_ros2_control plugin (see gazebo_control.xacro).

controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.02
      goal_time: 0.0
      joint1:
        trajectory: 0.05
        goal: 0.02
      joint2:
        trajectory: 0.05
        goal: 0.02
      joint3:
        trajectory: 0.05
        goal: 0.02
      joint4:
        trajectory: 0.05
        goal: 0.02
      joint5:
        trajectory: 0.05
        goal: 0.02
      joint6:
        trajectory: 0.05
        goal: 0.02

gripper_controller:
  ros__parameters:
    joints:
      - left_finger_joint
      - right_finger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      left_finger_joint:
        trajectory: 0.01
        goal: 0.005
      right_finger_joint:
        trajectory: 0.01
        goal: 0.005
